<main>

<section class="container section" data-global-search>
  <div class="hero fade-up" style="padding:24px;">
    <div class="hero-layout">
      <div class="hero-copy">
        <div>
          <div class="badge-row"><span class="badge">全站搜索</span><span class="badge">2000 部影片</span><span class="badge">即时筛选</span><span class="badge">静态索引</span></div>
          <h1>全站搜索<br><em>按标题、类型、地区或标签找片</em></h1>
          <p>搜索页会直接读取本地索引文件，支持标题、地区、年份、标签和简介关键词即时匹配。输入任意关键字后，结果会在当前页面即时重排。</p>
        </div>
        <div class="hero-actions">

          <a class="button secondary" href="./ranking.html">打开排行榜</a>
        </div>
      </div>
      <div class="panel raised" style="padding:20px;">
        <div class="toolbar" style="margin-bottom:14px;">
          <div class="field" style="flex:1;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true"><path d="M10.5 18.5a8 8 0 1 1 5.4-14.1A8 8 0 0 1 10.5 18.5Z" stroke="currentColor" stroke-width="1.8"/><path d="M16 16l4.5 4.5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
            <input type="search" data-global-input placeholder="搜索标题、关键词或类型">
          </div>
          <div class="field" style="max-width:230px;flex:0 1 230px;">
            <span style="color:var(--muted);white-space:nowrap;">排序</span>
            <select data-global-sort>
              <option value="all">默认</option>
              <option value="latest">最新年份</option>
              <option value="region">地区</option>
              <option value="genre">类型</option>
            </select>
          </div>
        </div>
        <div class="badge-row">
          <span class="badge hot is-active" data-global-chip data-value="全部">全部</span>
          <span class="badge" data-global-chip data-value="剧情">剧情</span>
          <span class="badge" data-global-chip data-value="悬疑">悬疑</span>
          <span class="badge" data-global-chip data-value="动作">动作</span>
          <span class="badge" data-global-chip data-value="爱情">爱情</span>
          <span class="badge" data-global-chip data-value="科幻">科幻</span>
        </div>

    </div>

  <div class="grid-4" data-global-results></div>
</section>
